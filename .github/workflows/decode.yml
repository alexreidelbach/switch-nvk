# Cloud symbol decoder — run addr2line against the latest Dolphin debug ELF
# entirely in GitHub Actions. Phone-friendly: type offsets into the run box,
# read function names in the log ~2 minutes later. No Mac needed.

name: Decode crash offsets

on:
  workflow_dispatch:
    inputs:
      offsets:
        description: "Space-separated module offsets (e.g. 0x6bbbf4 0x6dd098 0x6dd4c0)"
        required: true
        default: "0x6bbbf4 0x6dd098 0x6dd4c0"

permissions:
  contents: read
  actions: read

jobs:
  decode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Find latest successful Dolphin build
        id: dol
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=""
          for attempt in 1 2 3 4 5; do
            RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "Build tico-dolphin" --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null) && [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ] && break
            echo "Attempt $attempt failed — retrying in 20s..."
            RUN_ID=""
            sleep 20
          done
          [ -n "$RUN_ID" ] || { echo "No successful Dolphin run found."; exit 1; }
          echo "Using Dolphin run id: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download dolphin-nro artifact (contains debug ELF)
        uses: actions/download-artifact@v4
        with:
          name: dolphin-nro
          run-id: ${{ steps.dol.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Install aarch64 binutils
        run: sudo apt-get update -qq && sudo apt-get install -y -qq binutils-aarch64-linux-gnu

      - name: Decode offsets
        run: |
          set -e
          ELF=$(find . -name "dolphin-nx.debug.elf" | head -1)
          [ -n "$ELF" ] || { echo "ERROR: debug ELF not found in artifact"; exit 1; }
          echo "ELF: $ELF ($(du -h "$ELF" | cut -f1))"
          echo "==============================================="
          for off in ${{ github.event.inputs.offsets }}; do
            echo "=== $off ==="
            aarch64-linux-gnu-addr2line -e "$ELF" -f -C -i "$off" || true
            echo ""
          done
          echo "==============================================="
          echo "TIP: for disassembly around an offset, note it and ask Claude"
          echo "for an objdump variant of this workflow."
