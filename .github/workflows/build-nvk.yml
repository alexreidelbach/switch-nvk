# Cloud build for switch-nvk — v9
# Adds PDEV progress markers in nvk_physical_device.c to isolate WHICH call
# between sync-type creation and nvk_init_wsi is the crash. Also keeps VDS.

name: Build switch-nvk

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-nvk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build toolchain Docker image
        run: docker build -t switch-nvk-build -f Dockerfile .

      - name: Fetch Mesa 25.0.7
        run: |
          curl -L -o mesa.tar.xz https://archive.mesa3d.org/mesa-25.0.7.tar.xz
          tar xf mesa.tar.xz
          mv mesa-25.0.7 mesa-25
          rm mesa.tar.xz

      - name: Fix script permissions
        run: find . -name "*.sh" -exec chmod +x {} +

      - name: "Phase 1: build native tools on PRISTINE tree (mesa_clc + precomp)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            bash /work/build-native-tools.sh
            echo "=== verify mesa_clc ==="
            ls -la /work/native-prefix/bin/
            test -x /work/native-prefix/bin/mesa_clc
          '

      - name: Apply Switch patches + WSI backend
        run: |
          set -e
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/apply-patches.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/winsys/wsi/apply-wsi-switch.sh

      # ---- ALL SOURCE INSTRUMENTATION RUNS AFTER THE PATCH ----

      - name: "Instrument vk_drm_syncobj get_type (VDS debug)"
        run: |
          F=mesa-25/src/vulkan/runtime/vk_drm_syncobj.c
          perl -pi -e 'print "#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); char _b[128]; snprintf(_b,sizeof _b,\"VDS pre-getcap fd=%d feat=0x%x\\n\",drm_fd,(unsigned)type.features); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_b); }\n#endif\n" if /err = drmGetCap\(drm_fd, DRM_CAP_SYNCOBJ_TIMELINE/;' "$F"
          perl -pi -e 'print "#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); char _b[128]; snprintf(_b,sizeof _b,\"VDS final feat=0x%x gv=%p\\n\",(unsigned)type.features,(void*)type.get_value); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_b); }\n#endif\n" if /err = drmSyncobjDestroy\(drm_fd, syncobj\);/;' "$F"
          echo "VDS marker count (expect 2):"
          grep -c "VDS" "$F"

      - name: "Instrument nvk_physical_device progress (PDEV debug)"
        run: |
          F=mesa-25/src/nouveau/vulkan/nvk_physical_device.c
          perl -0777 -pi -e '
          s/(   result = vk_physical_device_init\(&pdev->vk,)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("PDEV A: before vk_physical_device_init\\n"); }\n#endif\n$1/;
          s/(   pdev->nak = nak_compiler_create\(&pdev->info\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("PDEV B: before nak_compiler_create\\n"); }\n#endif\n$1/;
          s/(   nvk_physical_device_init_pipeline_cache\(pdev\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("PDEV C: after nak, before pipeline_cache\\n"); }\n#endif\n$1/;
          s/(   pdev->vk.supported_sync_types = nvkmd->sync_types;)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("PDEV D: before init_wsi\\n"); }\n#endif\n$1/;
          ' "$F"
          echo "PDEV marker count (expect 4):"
          grep -c "PDEV " "$F"

      - name: "Restore timeline cap + syncobj destroy returns 0"
        run: |
          perl -0777 -pi -e 's/   case DRM_CAP_SYNCOBJ:\n      \*value = 1;\n      break;\n   case DRM_CAP_SYNCOBJ_TIMELINE:\n      \*value = 0;\n      break;/   case DRM_CAP_SYNCOBJ:\n   case DRM_CAP_SYNCOBJ_TIMELINE:\n      *value = 1;\n      break;/' winsys/drm_shim.c || true
          perl -0777 -pi -e 's/(   mutexUnlock\(&g_dev\.lock\);\n)   return s \? 0 : -ENOENT;/$1   return 0;/' winsys/drm_shim.c || true
          echo "(timeline cap restore + destroy fix applied where present)"

      - name: "Instrument syncobj/getcap entry points (SHIMCALL debug)"
        run: |
          perl -0777 -pi -e 's/(int drmGetCap\(int fd, uint64_t capability, uint64_t \*value\)\s*\{)/$1 extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink){char _c[80];snprintf(_c,sizeof _c,"SHIMCALL getcap 0x%llx\\n",(unsigned long long)capability);g_drm_shim_log_sink(_c);}/; s/(int drmSyncobjCreate\(int fd, uint32_t flags, uint32_t \*handle\)\s*\{)/$1 extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("SHIMCALL syncobj_create\\n");/;' winsys/drm_shim.c
          echo "SHIMCALL marker count (expect >=2):"
          grep -c "SHIMCALL" winsys/drm_shim.c

      - name: Build Rust std sysroot for the Switch target
        run: docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/build-std-sysroot.sh

      - name: "Phase 2: cross-configure Mesa NVK for Switch"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            export PATH=/work/native-prefix/bin:$PATH
            export BUILD=/work/mb
            bash /work/configure-mesa.sh
          '

      - name: "Phase 3: compile (ninja, tolerating the .so link failure)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            export PATH=/work/native-prefix/bin:$PATH
            ninja -C /work/mb -k 0 || echo "ninja reported failures (expected: the .so ICD link) — verifying static archives instead"
            echo "=== verifying the archives package-nvk.sh needs ==="
            fail=0
            for a in \
              src/nouveau/vulkan/libnvk.a \
              src/nouveau/codegen/libnouveau_codegen.a \
              src/util/libmesa_util.a src/util/libmesa_util_sse41.a src/util/blake3/libblake3.a \
              src/c11/impl/libmesa_util_c11.a \
              src/nouveau/compiler/libnak.a src/nouveau/compiler/libnak_rs.a \
              src/compiler/rust/libcompiler_c_helpers.a \
              src/nouveau/headers/libnvidia_headers_c.a \
              src/nouveau/nil/liblibnil.a src/nouveau/nil/liblibnil_format_table.a \
              src/compiler/nir/libnir.a src/compiler/libcompiler.a \
              src/nouveau/mme/libnouveau_mme.a src/nouveau/winsys/libnouveau_ws.a \
              src/vulkan/util/libvulkan_util.a src/compiler/spirv/libvtn.a \
              src/util/libxmlconfig.a ; do
              if [ -f "/work/mb/$a" ]; then echo "OK  $a"; else echo "MISSING  $a"; fail=1; fi
            done
            exit $fail
          '

      - name: Package nvk-switch install tree (with shim debug logging)
        run: |
          sed -i 's|\(-c winsys/drm_shim.c .*\)-O2|\1-O2 -DDRM_SHIM_DEBUG|' package-nvk.sh
          grep -n "drm_shim.c" package-nvk.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash package-nvk.sh

      - name: Bundle MESA_NVK_DIR tree for tico-dolphin
        run: |
          set -e
          mkdir -p nvk-build-tree/mb
          mkdir -p nvk-build-tree/mesa-25/include nvk-build-tree/mesa-25/src
          rsync -a --include='*/' --include='*.a' --exclude='*' mb/ nvk-build-tree/mb/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/include/ nvk-build-tree/mesa-25/include/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/src/ nvk-build-tree/mesa-25/src/
          tar -I 'gzip -6' -cf nvk-build-tree.tar.gz nvk-build-tree
          ls -lh nvk-build-tree.tar.gz

      - name: Upload nvk-switch package
        uses: actions/upload-artifact@v4
        with:
          name: nvk-switch
          path: nvk-switch/
          retention-days: 30

      - name: Upload MESA_NVK_DIR build tree
        uses: actions/upload-artifact@v4
        with:
          name: nvk-build-tree
          path: nvk-build-tree.tar.gz
          retention-days: 30

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=========== native tools meson log (tail) ==========="
          tail -n 80 native-tools/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"
          echo "=========== cross build meson log (tail) ==========="
          tail -n 120 mb/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs
          path: |
            mb/meson-logs/
            native-tools/meson-logs/
          retention-days: 7
