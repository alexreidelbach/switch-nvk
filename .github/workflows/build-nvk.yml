# Cloud build for switch-nvk — v28 *** PIPELINE + narrow SLIMEXEC: also drop the per-submit SyncptRead ioctl ***
# v15's P2FIX cured Properties2 -> vkCreateDevice now returns VK_SUCCESS and the
# GPU executes+retires its first command buffer. The DEVFN probe then named 12
# more NULL device functions — all victims of the same linker disease, living in
# just 4 unreferenced object files (vk_pipeline_layout, vk_framebuffer,
# vk_cmd_copy, nvk sampler). P2FIX2 adds one strong reference per symbol,
# forcing extraction of those objects; every weak entrypoint ref then binds.
# v14 MEASURED the root cause after ~15 builds:
#   WSIDT p2i=0x0  <- dispatch_table.GetPhysicalDeviceProperties2 is NULL
#   WSIA calling Properties2 -> crash (jump through NULL/garbage)
# WHY: vk_common_GetPhysicalDeviceProperties2 is GENERATED code in its own
# object file inside libvulkan_lite_runtime.a. Nothing strongly references it,
# so the static linker never extracts it; the weak entrypoint ref resolves to 0.
# FIX: explicitly wire the slot before nvk_init_wsi. The explicit reference is
# ALSO a strong symbol reference, forcing the linker to extract the real
# function. Keeps: all v14 probes (to confirm p2i != 0), -g, array resize.

name: Build switch-nvk

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-nvk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build toolchain Docker image
        run: docker build -t switch-nvk-build -f Dockerfile .

      - name: Fetch Mesa 25.0.7
        run: |
          curl -L -o mesa.tar.xz https://archive.mesa3d.org/mesa-25.0.7.tar.xz
          tar xf mesa.tar.xz
          mv mesa-25.0.7 mesa-25
          rm mesa.tar.xz

      - name: Fix script permissions
        run: find . -name "*.sh" -exec chmod +x {} +

      - name: "Add -g debug line info to the NVK cross compile"
        run: |
          set -e
          X=crossfiles/switch.cross
          perl -pi -e "s/'-O2','-ffunction-sections'/'-O2','-g','-ffunction-sections'/g" "$X"
          grep -q "'-O2','-g','-ffunction-sections'" "$X" || { echo "ERROR: -g not injected"; exit 1; }
          echo "OK: debug line info enabled."

      - name: "Phase 1: build native tools on PRISTINE tree (mesa_clc + precomp)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            bash /work/build-native-tools.sh
            echo "=== verify mesa_clc ==="
            ls -la /work/native-prefix/bin/
            test -x /work/native-prefix/bin/mesa_clc
          '

      - name: Apply Switch patches + WSI backend
        run: |
          set -e
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/apply-patches.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/winsys/wsi/apply-wsi-switch.sh

      # ---- ALL SOURCE EDITS RUN AFTER THE PATCH/COPY STEPS ----

      - name: "FORCE wsi[] array resize for VI platform (keep the fix)"
        run: |
          set -e
          H=mesa-25/src/vulkan/wsi/wsi_common.h
          if grep -q "VK_ICD_WSI_PLATFORM_VI + 1" "$H"; then
            echo "Array already sized for VI."
          else
            perl -0777 -pi -e 's/#define VK_ICD_WSI_PLATFORM_MAX \(VK_ICD_WSI_PLATFORM_METAL \+ 1\)/#ifdef VK_USE_PLATFORM_VI_NN\n#define VK_ICD_WSI_PLATFORM_MAX (VK_ICD_WSI_PLATFORM_VI + 1)\n#else\n#define VK_ICD_WSI_PLATFORM_MAX (VK_ICD_WSI_PLATFORM_METAL + 1)\n#endif/' "$H"
          fi
          grep -q "VK_ICD_WSI_PLATFORM_VI + 1" "$H" || { echo "ERROR: resize missing"; exit 1; }
          echo "OK: array resized."

      - name: "*** P2FIX: wire the NULL GetPhysicalDeviceProperties2 dispatch entry ***"
        run: |
          set -e
          F=mesa-25/src/nouveau/vulkan/nvk_physical_device.c
          grep -q "result = nvk_init_wsi(pdev);" "$F" || { echo "ERROR: anchor not found"; exit 1; }
          perl -0777 -pi -e 's/(   result = nvk_init_wsi\(pdev\);)/#ifdef __SWITCH__\n   {\n      extern VKAPI_ATTR void VKAPI_CALL vk_common_GetPhysicalDeviceProperties2(VkPhysicalDevice, VkPhysicalDeviceProperties2 *);\n      if (pdev->vk.dispatch_table.GetPhysicalDeviceProperties2 == NULL)\n         pdev->vk.dispatch_table.GetPhysicalDeviceProperties2 = vk_common_GetPhysicalDeviceProperties2;\n      extern void (*g_drm_shim_log_sink)(const char *);\n      if (g_drm_shim_log_sink) g_drm_shim_log_sink("P2FIX Properties2 wired\\n");\n   }\n#endif\n$1/' "$F"
          grep -q "P2FIX Properties2 wired" "$F" || { echo "ERROR: P2FIX did not apply"; exit 1; }
          echo "OK: P2FIX applied before nvk_init_wsi."

      - name: "*** P2FIX2: force-link the 12 dropped device functions ***"
        run: |
          set -e
          F=mesa-25/src/nouveau/vulkan/nvk_physical_device.c
          # prototypes for the vk_common_* symbols
          grep -q 'vk_common_entrypoints.h' "$F" || perl -0777 -pi -e 's/(#include "nvk_entrypoints.h"\n)/$1#include "vk_common_entrypoints.h"\n/' "$F"
          # strong references force archive-member extraction; weak refs then bind
          perl -0777 -pi -e 's/(   result = nvk_init_wsi\(pdev\);)/#ifdef __SWITCH__\n   {\n      static void * volatile _nvk_force_link[] = {\n         (void*)\&vk_common_CreatePipelineLayout, (void*)\&vk_common_DestroyPipelineLayout,\n         (void*)\&vk_common_CreateFramebuffer,    (void*)\&vk_common_DestroyFramebuffer,\n         (void*)\&vk_common_CmdCopyBuffer,        (void*)\&vk_common_CmdCopyImage,\n         (void*)\&vk_common_CmdBlitImage,         (void*)\&vk_common_CmdCopyBufferToImage,\n         (void*)\&vk_common_CmdCopyImageToBuffer, (void*)\&vk_common_CmdResolveImage,\n         (void*)\&nvk_CreateSampler,              (void*)\&nvk_DestroySampler,\n      };\n      extern void (*g_drm_shim_log_sink)(const char *);\n      if (g_drm_shim_log_sink) { char _b[96]; snprintf(_b,sizeof _b,"P2FIX2 forced=%u first=%p\\n",(unsigned)(sizeof(_nvk_force_link)\/sizeof(_nvk_force_link[0])),_nvk_force_link[0]); g_drm_shim_log_sink(_b); }\n   }\n#endif\n$1/' "$F"
          grep -q "vk_common_entrypoints.h" "$F" || { echo "ERROR: include missing"; exit 1; }
          grep -q "_nvk_force_link" "$F" || { echo "ERROR: force-link block missing"; exit 1; }
          echo "OK: P2FIX2 applied (12 symbols force-linked)."

      - name: "SHC: bracket nvk_compile_shader phases (find the crash phase)"
        run: |
          set -e
          F=mesa-25/src/nouveau/vulkan/nvk_shader.c
          perl -0777 -pi -e 's/(#include "nvk_shader.h")/$1\n#ifdef __SWITCH__\n#include <malloc.h>\n#endif/' "$F"
          perl -0777 -pi -e 's/(\n)([ \t]+)(nvk_lower_nir\(dev, nir)/${1}${2}#ifdef __SWITCH__\n${2}{ extern void (*g_drm_shim_log_sink)(const char *); static int _shc_n = 0; struct mallinfo _mi = mallinfo(); char _s[128]; unsigned _ni = 0; nir_foreach_function_impl(_impl, nir) { nir_foreach_block(_blk, _impl) { nir_foreach_instr(_ins, _blk) _ni++; } } snprintf(_s,sizeof _s,"SHC A n=%d stage=%d instrs=%u in=%llx out=%llx heap_free=%u\\n",++_shc_n,(int)info->stage,_ni,(unsigned long long)nir->info.inputs_read,(unsigned long long)nir->info.outputs_written,(unsigned)_mi.fordblks); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_s); enum { _CN = 64, _CSZ = 64 }; static unsigned char *_can[_CN]; static int _can_n = 0; for (int _i = 0; _i < _can_n; _i++) { if (!_can[_i]) continue; for (int _j = 0; _j < _CSZ; _j++) { if (_can[_i][_j] != (unsigned char)(0xA5 ^ _i ^ _j)) { char _c[160]; snprintf(_c,sizeof _c,"CANARY BAD slot=%d off=%d val=0x%02x at n=%d\\n",_i,_j,_can[_i][_j],_shc_n); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_c); _j = _CSZ; _i = _can_n; } } } if (_can_n < _CN) { _can[_can_n] = (unsigned char*)malloc(_CSZ); if (_can[_can_n]) { for (int _j = 0; _j < _CSZ; _j++) _can[_can_n][_j] = (unsigned char)(0xA5 ^ _can_n ^ _j); _can_n++; } } }\n${2}#endif\n${2}${3}/' "$F"
          perl -0777 -pi -e 's/(\n)([ \t]+)(result = nvk_compile_nir\()/${1}${2}#ifdef __SWITCH__\n${2}{ extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("SHC B nak-compile\\n"); }\n${2}#endif\n${2}${3}/' "$F"
          perl -0777 -pi -e 's/(\n)([ \t]+)(result = nvk_shader_upload\(dev, shader\);)/${1}${2}#ifdef __SWITCH__\n${2}{ extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("SHC C upload\\n"); }\n${2}#endif\n${2}${3}\n${2}#ifdef __SWITCH__\n${2}{ extern void (*g_drm_shim_log_sink)(const char *); char _d[48]; snprintf(_d,sizeof _d,"SHC D done res=%d\\n",(int)result); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_d); }\n${2}#endif/g' "$F"
          A=$(grep -c '"SHC A' "$F"); B=$(grep -c '"SHC B' "$F"); C=$(grep -c '"SHC C' "$F"); D=$(grep -c '"SHC D' "$F"); K=$(grep -c 'CANARY BAD' "$F")
          echo "markers: A=$A B=$B C=$C D=$D canary=$K (expect 1 1 2 2 1)"
          [ "$A" = "1" ] && [ "$B" = "1" ] && [ "$C" = "2" ] && [ "$D" = "2" ] && [ "$K" = "1" ] || { echo "ERROR: marker counts wrong"; exit 1; }
          echo "OK: SHC brackets + canaries in place."

      - name: "Instrument wsi_device_init: WSICB + WSIDT + call brackets"
        run: |
          set -e
          F=mesa-25/src/vulkan/wsi/wsi_common.c
          grep -q "WSI_GET_CB(GetPhysicalDeviceQueueFamilyProperties);" "$F" || { echo "ERROR: expected WSI_GET_CB block not found"; exit 1; }
          perl -0777 -pi -e 's/(#undef WSI_GET_CB\n)/$1#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); char _w[192]; snprintf(_w,sizeof _w,"WSICB esp=%p p2=%p mem=%p qfp=%p pa=%p\\n",(void*)GetPhysicalDeviceExternalSemaphoreProperties,(void*)GetPhysicalDeviceProperties2,(void*)GetPhysicalDeviceMemoryProperties,(void*)GetPhysicalDeviceQueueFamilyProperties,(void*)proc_addr); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_w); }\n   { extern void (*g_drm_shim_log_sink)(const char *); char _w[200]; struct vk_physical_device *_vpd = vk_physical_device_from_handle(pdevice); snprintf(_w,sizeof _w,"WSIDT p2i=%p memi=%p qfpi=%p espi=%p\\n",(void*)_vpd->dispatch_table.GetPhysicalDeviceProperties2,(void*)_vpd->dispatch_table.GetPhysicalDeviceMemoryProperties,(void*)_vpd->dispatch_table.GetPhysicalDeviceQueueFamilyProperties,(void*)_vpd->dispatch_table.GetPhysicalDeviceExternalSemaphoreProperties); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_w); }\n#endif\n/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceProperties2\(pdevice, &pdp2\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIA calling Properties2\\n"); }\n#endif\n$1/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceMemoryProperties\(pdevice, &wsi->memory_props\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIB calling MemoryProperties\\n"); }\n#endif\n$1/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceQueueFamilyProperties\(pdevice, &wsi->queue_family_count, NULL\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIC calling QueueFamilyProps\\n"); }\n#endif\n$1/' "$F"
          echo "marker presence (expect all found):"
          grep -q "WSICB" "$F" && echo "WSICB ok"
          grep -q "WSIDT" "$F" && echo "WSIDT ok"
          grep -q "WSIA calling" "$F" && echo "WSIA ok"
          grep -q "WSIB calling" "$F" && echo "WSIB ok"
          grep -q "WSIC calling" "$F" && echo "WSIC ok"

      - name: Build Rust std sysroot for the Switch target
        run: docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/build-std-sysroot.sh

      - name: "Phase 2: cross-configure Mesa NVK for Switch"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            export PATH=/work/native-prefix/bin:$PATH
            export BUILD=/work/mb
            bash /work/configure-mesa.sh
          '

      - name: "Phase 3: compile (ninja, tolerating the .so link failure)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            export PATH=/work/native-prefix/bin:$PATH
            ninja -C /work/mb -k 0 || echo "ninja reported failures (expected: the .so ICD link) — verifying static archives instead"
            echo "=== verifying the archives package-nvk.sh needs ==="
            fail=0
            for a in \
              src/nouveau/vulkan/libnvk.a \
              src/nouveau/codegen/libnouveau_codegen.a \
              src/util/libmesa_util.a src/util/libmesa_util_sse41.a src/util/blake3/libblake3.a \
              src/c11/impl/libmesa_util_c11.a \
              src/nouveau/compiler/libnak.a src/nouveau/compiler/libnak_rs.a \
              src/compiler/rust/libcompiler_c_helpers.a \
              src/nouveau/headers/libnvidia_headers_c.a \
              src/nouveau/nil/liblibnil.a src/nouveau/nil/liblibnil_format_table.a \
              src/compiler/nir/libnir.a src/compiler/libcompiler.a \
              src/nouveau/mme/libnouveau_mme.a src/nouveau/winsys/libnouveau_ws.a \
              src/vulkan/util/libvulkan_util.a src/compiler/spirv/libvtn.a \
              src/util/libxmlconfig.a ; do
              if [ -f "/work/mb/$a" ]; then echo "OK  $a"; else echo "MISSING  $a"; fail=1; fi
            done
            exit $fail
          '

      - name: "PIPELINE: defer the per-submit drain, sync before destructive ops"
        run: |
          set -e
          S=winsys/drm_shim.c
          # sanity: the deadlock-causing LOCK wrapper must NOT be present
          grep -q "nouveau_exec_unlocked" "$S" && { echo "ERROR: LOCK wrapper present"; exit 1; }
          # 1) per-channel deferred fence state
          perl -0777 -pi -e 's/(   int          zcull_bo;        \/\* bos\[\] slot for the Zcull context           \*\/\n\};)/   NvFence      pending_fence;\n   bool         has_pending;\n$1/' "$S"
          # 2) drain helper, defined before its first use
          perl -0777 -pi -e 's/(int drmCloseBufferHandle\(int fd, uint32_t handle\)\n\{)/static void shim_drain_all_pending(void)\n{\n   for (int _i = 0; _i < SHIM_MAX_CHANNELS; _i++) {\n      struct shim_channel *_c = \&g_dev.channels[_i];\n      if (_c->used \&\& _c->has_pending) {\n         nvFenceWait(\&_c->pending_fence, 2000000LL);\n         _c->has_pending = false;\n      }\n   }\n}\n\n$1/' "$S"
          # 3) GPU idle before a buffer is freed
          perl -0777 -pi -e 's/(int drmCloseBufferHandle\(int fd, uint32_t handle\)\n\{\n   if \(!drm_shim_owns_fd\(fd\)\) \{ errno = EBADF; return -EBADF; \}\n   mutexLock\(&g_dev\.lock\);)/$1\n   shim_drain_all_pending();/' "$S"
          # 4) GPU idle before any VA unmap
          perl -0777 -pi -e 's/(   if \(is_unmap\) \{\n)/$1      shim_drain_all_pending();\n/' "$S"
          # 5) drain the PREVIOUS submit on this channel at handler entry
          perl -0777 -pi -e 's/(\n   SHIM_LOG\("EXEC enter chan=%u)/\n   if (ch->has_pending) { nvFenceWait(\&ch->pending_fence, 2000000LL); ch->has_pending = false; }$1/' "$S"
          # 6) stash this submit fence instead of blocking on it
          perl -0777 -pi -e 's/   Result wr = nvFenceWait\(&fence, 2000000LL\);\n   SHIM_LOG\("EXEC drain chan=%u fence=%u\/%u rc=0x%x\\n",\n            \(unsigned\)req->channel, fence.id, fence.value, wr\);/   ch->pending_fence = fence;\n   ch->has_pending = true;/' "$S"
          HL=$(grep -n "shim_drain_all_pending(void)" "$S" | head -1 | cut -d: -f1)
          FU=$(grep -n "shim_drain_all_pending();" "$S" | head -1 | cut -d: -f1)
          C=$(grep -c "shim_drain_all_pending();" "$S" || true); P=$(grep -c "if (ch->has_pending) { nvFenceWait" "$S" || true)
          D=$(grep -c "ch->has_pending = true" "$S" || true); O=$(grep -c "Result wr = nvFenceWait" "$S" || true)
          echo "helper=$HL firstuse=$FU calls=$C predrain=$P defer=$D olddrain=$O (expect calls=2 predrain=1 defer=1 olddrain=0)"
          [ "$HL" -lt "$FU" ] || { echo "ERROR: helper after first use"; exit 1; }
          [ "$C" = "2" ] && [ "$P" = "1" ] && [ "$D" = "1" ] && [ "$O" = "0" ] || { echo "ERROR: patch counts wrong"; exit 1; }
          echo "OK: submits pipelined; drains guard every destructive op."
          # 7) the per-submit syncpt READ is a pure diagnostic ioctl that runs even in
          #    release (only its SHIM_LOG compiles out). CPU is now the bottleneck, so
          #    drop it. The error-notifier read is LEFT ALONE: it likely clears latched
          #    channel error state and removing it wedged the channel last time.
          perl -0777 -pi -e 's/(\n   \{\n      u32 cur = 0;)/\n#ifdef DRM_SHIM_DEBUG$1/' "$S"
          perl -0777 -pi -e 's/(\n   \/\* Read the channel error notifier:)/\n#endif$1/' "$S"
          grep -B2 "u32 cur = 0;" "$S" | grep -q "#ifdef DRM_SHIM_DEBUG" || { echo "ERROR: slim ifdef not placed"; exit 1; }
          grep -B3 "Read the channel error notifier" "$S" | grep -q "#endif" || { echo "ERROR: slim endif not placed"; exit 1; }
          grep -q "nvGpuChannelGetErrorNotification" "$S" || { echo "ERROR: notifier read must remain"; exit 1; }
          echo "OK: per-submit SyncptRead is debug-only; error notifier untouched."

      - name: "Package nvk-switch install tree (QUIET: release, no shim diagnostics)"
        run: |
          sed -i 's|\(-c winsys/drm_shim.c .*\)-O2|\1-O2 -g|' package-nvk.sh
          echo "QUIET build: no DRM_SHIM_DEBUG — SHIM_LOG and the per-submit diagnostic syscalls compiled out."
          grep -n "drm_shim.c" package-nvk.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash package-nvk.sh

      - name: Bundle MESA_NVK_DIR tree for tico-dolphin
        run: |
          set -e
          mkdir -p nvk-build-tree/mb
          mkdir -p nvk-build-tree/mesa-25/include nvk-build-tree/mesa-25/src
          rsync -a --include='*/' --include='*.a' --exclude='*' mb/ nvk-build-tree/mb/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/include/ nvk-build-tree/mesa-25/include/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/src/ nvk-build-tree/mesa-25/src/
          tar -I 'gzip -6' -cf nvk-build-tree.tar.gz nvk-build-tree
          ls -lh nvk-build-tree.tar.gz

      - name: Upload nvk-switch package
        uses: actions/upload-artifact@v4
        with:
          name: nvk-switch
          path: nvk-switch/
          retention-days: 30

      - name: Upload MESA_NVK_DIR build tree
        uses: actions/upload-artifact@v4
        with:
          name: nvk-build-tree
          path: nvk-build-tree.tar.gz
          retention-days: 30

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=========== native tools meson log (tail) ==========="
          tail -n 80 native-tools/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"
          echo "=========== cross build meson log (tail) ==========="
          tail -n 120 mb/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs
          path: |
            mb/meson-logs/
            native-tools/meson-logs/
          retention-days: 7
