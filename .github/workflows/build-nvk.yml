# Cloud build for switch-nvk — v15  *** THE MEASURED FIX ***
# v14 MEASURED the root cause after ~15 builds:
#   WSIDT p2i=0x0  <- dispatch_table.GetPhysicalDeviceProperties2 is NULL
#   WSIA calling Properties2 -> crash (jump through NULL/garbage)
# WHY: vk_common_GetPhysicalDeviceProperties2 is GENERATED code in its own
# object file inside libvulkan_lite_runtime.a. Nothing strongly references it,
# so the static linker never extracts it; the weak entrypoint ref resolves to 0.
# FIX: explicitly wire the slot before nvk_init_wsi. The explicit reference is
# ALSO a strong symbol reference, forcing the linker to extract the real
# function. Keeps: all v14 probes (to confirm p2i != 0), -g, array resize.

name: Build switch-nvk

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-nvk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build toolchain Docker image
        run: docker build -t switch-nvk-build -f Dockerfile .

      - name: Fetch Mesa 25.0.7
        run: |
          curl -L -o mesa.tar.xz https://archive.mesa3d.org/mesa-25.0.7.tar.xz
          tar xf mesa.tar.xz
          mv mesa-25.0.7 mesa-25
          rm mesa.tar.xz

      - name: Fix script permissions
        run: find . -name "*.sh" -exec chmod +x {} +

      - name: "Add -g debug line info to the NVK cross compile"
        run: |
          set -e
          X=crossfiles/switch.cross
          perl -pi -e "s/'-O2','-ffunction-sections'/'-O2','-g','-ffunction-sections'/g" "$X"
          grep -q "'-O2','-g','-ffunction-sections'" "$X" || { echo "ERROR: -g not injected"; exit 1; }
          echo "OK: debug line info enabled."

      - name: "Phase 1: build native tools on PRISTINE tree (mesa_clc + precomp)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            bash /work/build-native-tools.sh
            echo "=== verify mesa_clc ==="
            ls -la /work/native-prefix/bin/
            test -x /work/native-prefix/bin/mesa_clc
          '

      - name: Apply Switch patches + WSI backend
        run: |
          set -e
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/apply-patches.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/winsys/wsi/apply-wsi-switch.sh

      # ---- ALL SOURCE EDITS RUN AFTER THE PATCH/COPY STEPS ----

      - name: "FORCE wsi[] array resize for VI platform (keep the fix)"
        run: |
          set -e
          H=mesa-25/src/vulkan/wsi/wsi_common.h
          if grep -q "VK_ICD_WSI_PLATFORM_VI + 1" "$H"; then
            echo "Array already sized for VI."
          else
            perl -0777 -pi -e 's/#define VK_ICD_WSI_PLATFORM_MAX \(VK_ICD_WSI_PLATFORM_METAL \+ 1\)/#ifdef VK_USE_PLATFORM_VI_NN\n#define VK_ICD_WSI_PLATFORM_MAX (VK_ICD_WSI_PLATFORM_VI + 1)\n#else\n#define VK_ICD_WSI_PLATFORM_MAX (VK_ICD_WSI_PLATFORM_METAL + 1)\n#endif/' "$H"
          fi
          grep -q "VK_ICD_WSI_PLATFORM_VI + 1" "$H" || { echo "ERROR: resize missing"; exit 1; }
          echo "OK: array resized."

      - name: "*** P2FIX: wire the NULL GetPhysicalDeviceProperties2 dispatch entry ***"
        run: |
          set -e
          F=mesa-25/src/nouveau/vulkan/nvk_physical_device.c
          grep -q "result = nvk_init_wsi(pdev);" "$F" || { echo "ERROR: anchor not found"; exit 1; }
          perl -0777 -pi -e 's/(   result = nvk_init_wsi\(pdev\);)/#ifdef __SWITCH__\n   {\n      extern VKAPI_ATTR void VKAPI_CALL vk_common_GetPhysicalDeviceProperties2(VkPhysicalDevice, VkPhysicalDeviceProperties2 *);\n      if (pdev->vk.dispatch_table.GetPhysicalDeviceProperties2 == NULL)\n         pdev->vk.dispatch_table.GetPhysicalDeviceProperties2 = vk_common_GetPhysicalDeviceProperties2;\n      extern void (*g_drm_shim_log_sink)(const char *);\n      if (g_drm_shim_log_sink) g_drm_shim_log_sink("P2FIX Properties2 wired\\n");\n   }\n#endif\n$1/' "$F"
          grep -q "P2FIX Properties2 wired" "$F" || { echo "ERROR: P2FIX did not apply"; exit 1; }
          echo "OK: P2FIX applied before nvk_init_wsi."

      - name: "Instrument wsi_device_init: WSICB + WSIDT + call brackets"
        run: |
          set -e
          F=mesa-25/src/vulkan/wsi/wsi_common.c
          grep -q "WSI_GET_CB(GetPhysicalDeviceQueueFamilyProperties);" "$F" || { echo "ERROR: expected WSI_GET_CB block not found"; exit 1; }
          perl -0777 -pi -e 's/(#undef WSI_GET_CB\n)/$1#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); char _w[192]; snprintf(_w,sizeof _w,"WSICB esp=%p p2=%p mem=%p qfp=%p pa=%p\\n",(void*)GetPhysicalDeviceExternalSemaphoreProperties,(void*)GetPhysicalDeviceProperties2,(void*)GetPhysicalDeviceMemoryProperties,(void*)GetPhysicalDeviceQueueFamilyProperties,(void*)proc_addr); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_w); }\n   { extern void (*g_drm_shim_log_sink)(const char *); char _w[200]; struct vk_physical_device *_vpd = vk_physical_device_from_handle(pdevice); snprintf(_w,sizeof _w,"WSIDT p2i=%p memi=%p qfpi=%p espi=%p\\n",(void*)_vpd->dispatch_table.GetPhysicalDeviceProperties2,(void*)_vpd->dispatch_table.GetPhysicalDeviceMemoryProperties,(void*)_vpd->dispatch_table.GetPhysicalDeviceQueueFamilyProperties,(void*)_vpd->dispatch_table.GetPhysicalDeviceExternalSemaphoreProperties); if(g_drm_shim_log_sink)g_drm_shim_log_sink(_w); }\n#endif\n/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceProperties2\(pdevice, &pdp2\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIA calling Properties2\\n"); }\n#endif\n$1/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceMemoryProperties\(pdevice, &wsi->memory_props\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIB calling MemoryProperties\\n"); }\n#endif\n$1/' "$F"
          perl -0777 -pi -e 's/(   GetPhysicalDeviceQueueFamilyProperties\(pdevice, &wsi->queue_family_count, NULL\);)/#ifdef __SWITCH__\n   { extern void (*g_drm_shim_log_sink)(const char *); if(g_drm_shim_log_sink)g_drm_shim_log_sink("WSIC calling QueueFamilyProps\\n"); }\n#endif\n$1/' "$F"
          echo "marker presence (expect all found):"
          grep -q "WSICB" "$F" && echo "WSICB ok"
          grep -q "WSIDT" "$F" && echo "WSIDT ok"
          grep -q "WSIA calling" "$F" && echo "WSIA ok"
          grep -q "WSIB calling" "$F" && echo "WSIB ok"
          grep -q "WSIC calling" "$F" && echo "WSIC ok"

      - name: Build Rust std sysroot for the Switch target
        run: docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash /work/build-std-sysroot.sh

      - name: "Phase 2: cross-configure Mesa NVK for Switch"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            set -e
            export NATIVE_PREFIX=/work/native-prefix
            export PATH=/work/native-prefix/bin:$PATH
            export BUILD=/work/mb
            bash /work/configure-mesa.sh
          '

      - name: "Phase 3: compile (ninja, tolerating the .so link failure)"
        run: |
          docker run --rm -v "$PWD:/work" -w /work/mesa-25 switch-nvk-build bash -lc '
            export PATH=/work/native-prefix/bin:$PATH
            ninja -C /work/mb -k 0 || echo "ninja reported failures (expected: the .so ICD link) — verifying static archives instead"
            echo "=== verifying the archives package-nvk.sh needs ==="
            fail=0
            for a in \
              src/nouveau/vulkan/libnvk.a \
              src/nouveau/codegen/libnouveau_codegen.a \
              src/util/libmesa_util.a src/util/libmesa_util_sse41.a src/util/blake3/libblake3.a \
              src/c11/impl/libmesa_util_c11.a \
              src/nouveau/compiler/libnak.a src/nouveau/compiler/libnak_rs.a \
              src/compiler/rust/libcompiler_c_helpers.a \
              src/nouveau/headers/libnvidia_headers_c.a \
              src/nouveau/nil/liblibnil.a src/nouveau/nil/liblibnil_format_table.a \
              src/compiler/nir/libnir.a src/compiler/libcompiler.a \
              src/nouveau/mme/libnouveau_mme.a src/nouveau/winsys/libnouveau_ws.a \
              src/vulkan/util/libvulkan_util.a src/compiler/spirv/libvtn.a \
              src/util/libxmlconfig.a ; do
              if [ -f "/work/mb/$a" ]; then echo "OK  $a"; else echo "MISSING  $a"; fail=1; fi
            done
            exit $fail
          '

      - name: Package nvk-switch install tree (with shim debug logging)
        run: |
          sed -i 's|\(-c winsys/drm_shim.c .*\)-O2|\1-O2 -g -DDRM_SHIM_DEBUG|' package-nvk.sh
          grep -n "drm_shim.c" package-nvk.sh
          docker run --rm -v "$PWD:/work" -w /work switch-nvk-build bash package-nvk.sh

      - name: Bundle MESA_NVK_DIR tree for tico-dolphin
        run: |
          set -e
          mkdir -p nvk-build-tree/mb
          mkdir -p nvk-build-tree/mesa-25/include nvk-build-tree/mesa-25/src
          rsync -a --include='*/' --include='*.a' --exclude='*' mb/ nvk-build-tree/mb/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/include/ nvk-build-tree/mesa-25/include/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' mesa-25/src/ nvk-build-tree/mesa-25/src/
          tar -I 'gzip -6' -cf nvk-build-tree.tar.gz nvk-build-tree
          ls -lh nvk-build-tree.tar.gz

      - name: Upload nvk-switch package
        uses: actions/upload-artifact@v4
        with:
          name: nvk-switch
          path: nvk-switch/
          retention-days: 30

      - name: Upload MESA_NVK_DIR build tree
        uses: actions/upload-artifact@v4
        with:
          name: nvk-build-tree
          path: nvk-build-tree.tar.gz
          retention-days: 30

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=========== native tools meson log (tail) ==========="
          tail -n 80 native-tools/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"
          echo "=========== cross build meson log (tail) ==========="
          tail -n 120 mb/meson-logs/meson-log.txt 2>/dev/null || echo "(none)"

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs
          path: |
            mb/meson-logs/
            native-tools/meson-logs/
          retention-days: 7
