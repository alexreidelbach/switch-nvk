# Build tico-dolphin (Wii online) — v7  *** NAME THE DEVICE-CREATION FAILURE ***
# v15 NVK + v6 Dolphin BROKE THROUGH: WSI init completes, GPU enumerates,
# Mario Kart boots to "Failed to create Vulkan device" (clean VkResult failure).
# v7 adds instrumentation to name the exact cause:
#   DEVEXT avail <name>      — every device extension NVK advertises
#   DEVEXT MISSING <name>    — any extension Dolphin wants that NVK lacks
#   DEVCREATE res=<n>        — the actual vkCreateDevice VkResult
# Everything else identical to v6 (caps2 skip + 1.1 cap kept — that config works).
# Reuses the current v15 NVK — no NVK rebuild needed.

name: Build tico-dolphin

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-dolphin.yml"
      - "tico/wii-online.patch"

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout (for the patch file)
        uses: actions/checkout@v4

      - name: Find latest successful NVK build
        id: nvk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "Build switch-nvk" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful 'Build switch-nvk' run found."
            exit 1
          fi
          echo "Using NVK run id: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download NVK build tree
        uses: actions/download-artifact@v4
        with:
          name: nvk-build-tree
          run-id: ${{ steps.nvk.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download nvk-switch package
        uses: actions/download-artifact@v4
        with:
          name: nvk-switch
          path: nvk-switch
          run-id: ${{ steps.nvk.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Synthesize MESA_NVK_DIR layout
        run: |
          set -e
          tar xf nvk-build-tree.tar.gz
          mkdir -p mesa-tree
          cp -r nvk-build-tree/mesa-25/include mesa-tree/include
          cp -r nvk-build-tree/mb mesa-tree/nvk-build
          cp nvk-switch/lib/libvulkan.a mesa-tree/nvk-build/src/nouveau/vulkan/libvulkan.a
          ls -lh mesa-tree/nvk-build/src/nouveau/vulkan/libvulkan.a

      - name: VERIFY the NVK carries the array-resize fix AND P2FIX
        run: |
          set -e
          H=nvk-build-tree/mesa-25/src/vulkan/wsi/wsi_common.h
          grep -q "VK_ICD_WSI_PLATFORM_VI + 1" "$H" || { echo "*** MISSING array-resize fix. Re-run Build switch-nvk (v15). ***"; exit 1; }
          echo "OK: array-resize fix present."
          strings nvk-switch/lib/libvulkan.a | grep -qF "P2FIX Properties2 wired" || { echo "*** MISSING P2FIX in compiled NVK. Re-run Build switch-nvk (v15). ***"; exit 1; }
          echo "OK: P2FIX compiled into NVK. Safe to build."

      - name: Clone tico-dolphin (with submodules)
        run: |
          git clone --depth 1 --recurse-submodules --shallow-submodules -j8 https://github.com/ticohq/tico-dolphin.git

      - name: Apply Wii online networking patch
        run: |
          cd tico-dolphin
          git config user.email ci@local
          git config user.name ci
          git apply --3way --whitespace=fix ../tico/wii-online.patch || \
            git apply --3way --whitespace=fix --reject ../tico/wii-online.patch
          git status --short

      - name: "FIX 1: skip surface_capabilities2 on Switch (kept from v6)"
        run: |
          set -e
          F=tico-dolphin/Source/Core/VideoBackends/Vulkan/VulkanContext.cpp
          perl -0777 -pi -e 's/  if \(wstype != WindowSystemType::Headless\)\n  \{\n    AddExtension\(VK_KHR_GET_SURFACE_CAPABILITIES_2_EXTENSION_NAME, false\);\n  \}/  if (wstype != WindowSystemType::Headless \&\& wstype != WindowSystemType::Switch)\n  {\n    AddExtension(VK_KHR_GET_SURFACE_CAPABILITIES_2_EXTENSION_NAME, false);\n  }/' "$F"
          grep -q "Headless && wstype != WindowSystemType::Switch" "$F" || { echo "ERROR: caps2 fix did not apply"; exit 1; }
          echo "OK: caps2 skipped on Switch."

      - name: "FIX 2: cap Vulkan instance at 1.1 (kept from v6)"
        run: |
          set -e
          F=tico-dolphin/Source/Core/VideoBackends/Vulkan/VulkanContext.cpp
          perl -0777 -pi -e 's/    if \(supported_version >= VK_API_VERSION_1_2\)\n      used_version = VK_API_VERSION_1_2;\n    else if \(supported_version >= VK_API_VERSION_1_1\)\n      used_version = VK_API_VERSION_1_1;/    if (supported_version >= VK_API_VERSION_1_1)\n      used_version = VK_API_VERSION_1_1;/' "$F"
          if grep -q "used_version = VK_API_VERSION_1_2;" "$F"; then echo "ERROR: 1.2 path remains"; exit 1; fi
          echo "OK: capped at Vulkan 1.1."

      - name: "NEW: instrument extension selection + device creation (DEVEXT/DEVCREATE)"
        run: |
          set -e
          F=tico-dolphin/Source/Core/VideoBackends/Vulkan/VulkanContext.cpp
          # 0) helper at top of file, BEFORE both SelectInstanceExtensions and SelectDeviceExtensions
          grep -q "^namespace Vulkan$" "$F" || { echo "ERROR: namespace anchor not found"; exit 1; }
          perl -0777 -pi -e 's/(namespace Vulkan\n\{)/#include <cstdio>\nextern "C" { extern void (*g_drm_shim_log_sink)(const char*); }\nstatic void NxDevLog(const char* s){ if(g_drm_shim_log_sink) g_drm_shim_log_sink(s); }\n$1/' "$F"
          # 1) log every advertised extension — BOTH instance and device lists (/g)
          perl -0777 -pi -e 's/(  for \(const auto& extension_properties : available_extension_list\)\n    INFO_LOG_FMT\(VIDEO, "Available extension: \{\}", extension_properties\.extensionName\);)/$1\n  for (const auto& _e : available_extension_list) { char _b[160]; snprintf(_b,sizeof _b,"DEVEXT avail %s\\n", _e.extensionName); NxDevLog(_b); }/g' "$F"
          # 2) log any missing extension — BOTH lambdas (/g)
          perl -0777 -pi -e 's/(    if \(required\)\n      ERROR_LOG_FMT\(VIDEO, "Vulkan: Missing required extension \{\}\.", name\);)/    { char _b[160]; snprintf(_b,sizeof _b,"DEVEXT MISSING %s (required=%d)\\n", name, (int)required); NxDevLog(_b); }\n$1/g' "$F"
          # 3) log the vkCreateDevice VkResult
          perl -0777 -pi -e 's/(  VkResult res = vkCreateDevice\(m_physical_device, &device_info, nullptr, &m_device\);)/$1\n  { char _b[96]; snprintf(_b,sizeof _b,"DEVCREATE vkCreateDevice res=%d\\n",(int)res); NxDevLog(_b); }/' "$F"
          echo "=== verify instrumentation ==="
          grep -q "static void NxDevLog" "$F" || { echo "ERROR: helper missing"; exit 1; }
          A=$(grep -c "DEVEXT avail" "$F"); M=$(grep -c "DEVEXT MISSING" "$F")
          echo "avail loops: $A (expect 2)  missing logs: $M (expect 2)"
          [ "$A" = "2" ] || { echo "ERROR: avail count wrong"; exit 1; }
          [ "$M" = "2" ] || { echo "ERROR: missing count wrong"; exit 1; }
          grep -q "DEVCREATE vkCreateDevice" "$F" || { echo "ERROR: result log missing"; exit 1; }
          # helper must appear BEFORE first use
          HL=$(grep -n "static void NxDevLog" "$F" | head -1 | cut -d: -f1)
          FU=$(grep -n "NxDevLog(_b)" "$F" | head -1 | cut -d: -f1)
          [ "$HL" -lt "$FU" ] || { echo "ERROR: helper declared after first use"; exit 1; }
          echo "OK: instrumentation in place (helper at line $HL, first use at line $FU)."
          # 4) VulkanLoader.cpp: name every null REQUIRED function (device + instance loaders)
          L=tico-dolphin/Source/Core/VideoBackends/Vulkan/VulkanLoader.cpp
          grep -q "^namespace Vulkan$" "$L" || { echo "ERROR: loader namespace anchor not found"; exit 1; }
          perl -0777 -pi -e 's/(namespace Vulkan\n\{)/#include <cstdio>\nextern "C" { extern void (*g_drm_shim_log_sink)(const char*); }\nstatic void NxLdrLog(const char* s){ if(g_drm_shim_log_sink) g_drm_shim_log_sink(s); }\n$1/' "$L"
          perl -0777 -pi -e 's/(      ERROR_LOG_FMT\(HOST_GPU, "Vulkan: Failed to load required device function \{\}", name\);)/      { char _b[160]; snprintf(_b,sizeof _b,"DEVFN MISSING %s\\n", name); NxLdrLog(_b); }\n$1/' "$L"
          perl -0777 -pi -e 's/(      ERROR_LOG_FMT\(HOST_GPU, "Vulkan: Failed to load required instance function \{\}", name\);)/      { char _b[160]; snprintf(_b,sizeof _b,"INSTFN MISSING %s\\n", name); NxLdrLog(_b); }\n$1/' "$L"
          grep -q "DEVFN MISSING" "$L" || { echo "ERROR: device-loader probe missing"; exit 1; }
          grep -q "INSTFN MISSING" "$L" || { echo "ERROR: instance-loader probe missing"; exit 1; }
          echo "OK: loader probes in place (DEVFN/INSTFN)."

      - name: Add linker wrap flags required by the NVK fat lib
        run: |
          sed -i 's|switch.specs"|switch.specs -Wl,--wrap=open -Wl,--wrap=close -Wl,--wrap=stat -Wl,--wrap=lstat"|' \
            tico-dolphin/Source/Core/DolphinNX/nx-toolchain.cmake

      - name: Enable Dan's boot log (debug build)
        run: |
          sed -i 's|static constexpr bool kNxLogEnabled = false;|static constexpr bool kNxLogEnabled = true;|' \
            tico-dolphin/Source/Core/DolphinNX/main.cpp

      - name: Add missing link libraries (curl, mbedtls, expat, EGL)
        run: |
          set -e
          CM=tico-dolphin/Source/Core/DolphinNX/CMakeLists.txt
          sed -i 's|-ldrm_nouveau|-lcurl -lmbedtls -lmbedx509 -lmbedcrypto -lexpat -ldrm_nouveau|' "$CM"
          sed -i 's|${DEVKITPRO}/portlibs/switch/lib/libSDL2.a|${DEVKITPRO}/portlibs/switch/lib/libSDL2.a ${DEVKITPRO}/portlibs/switch/lib/libEGL.a ${DEVKITPRO}/portlibs/switch/lib/libglapi.a|' "$CM"
          grep -n "lcurl\|libEGL" "$CM"

      - name: Build dolphin.nro
        run: |
          docker run --rm -v "$PWD:/ws" -w /ws/tico-dolphin devkitpro/devkita64:latest bash -lc '
            set -e
            apt-get update -qq && apt-get install -y -qq cmake ninja-build rsync >/dev/null
            dkp-pacman -Sy --noconfirm --needed switch-sdl2 switch-libdrm_nouveau switch-zstd switch-zlib switch-curl switch-mbedtls switch-mesa || true
            dkp-pacman -S --noconfirm --needed switch-libexpat || dkp-pacman -S --noconfirm --needed switch-expat || true
            export MESA_NVK_DIR=/ws/mesa-tree/nvk-build
            bash build_dolphin_standalone_nro.sh
          '

      - name: Upload dolphin.nro
        uses: actions/upload-artifact@v4
        with:
          name: dolphin-nro
          path: |
            tico-dolphin/build_nx_standalone/dolphin.nro
            tico-dolphin/build_nx_standalone/Binaries/dolphin-nx.debug.elf
          retention-days: 30

      - name: Show CMake logs on failure
        if: failure()
        run: |
          tail -n 150 tico-dolphin/build_nx_standalone/CMakeFiles/CMakeError.log 2>/dev/null || echo "(no CMakeError.log)"
